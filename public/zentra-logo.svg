<svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer glow circle -->
  <circle cx="30" cy="30" r="28" fill="url(#glowGradient)" opacity="0.6"/>
  <!-- Main circle with bright gradient -->
  <circle cx="30" cy="30" r="24" fill="url(#gradient1)"/>
  <!-- Diamond shape with bright colors -->
  <path d="M20 30 L30 20 L40 30 L30 40 Z" fill="url(#gradient2)"/>
  <!-- Inner highlight -->
  <circle cx="30" cy="30" r="18" fill="none" stroke="url(#highlightGradient)" stroke-width="1" opacity="0.5"/>
  <defs>
    <!-- Glow gradient for outer circle -->
    <radialGradient id="glowGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0.3" />
    </radialGradient>
    <!-- Main bright gradient -->
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:1" />
    </linearGradient>
    <!-- Diamond bright gradient -->
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <!-- Highlight gradient -->
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DDD6FE;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.3" />
    </linearGradient>
  </defs>
</svg>

